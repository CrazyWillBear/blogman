name: CI

on:
  push:
    branches: [main, rewrite]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-only-secret
